<style>
:root{--dark:#14110f;--ink:#2a211c;--muted:#6d625b;--cream:#fffaf4;--beige:#f3eadf;--gold:#c9a96e;--gold2:#a67b36}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:'DM Sans',sans-serif;color:var(--ink);background:linear-gradient(180deg,#fffaf4,#fff,#f7efe7)}img,video{display:block;width:100%}a{text-decoration:none;color:inherit}h1,h2,h3{font-family:'Playfair Display',serif;margin:0;color:var(--dark)}p{line-height:1.7}.topbar{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;justify-content:center;padding:14px 18px;background:linear-gradient(180deg,rgba(0,0,0,.55),rgba(0,0,0,0));pointer-events:none}.topbar span{color:#fff;letter-spacing:3px;font-size:13px;font-weight:800;text-shadow:0 8px 20px rgba(0,0,0,.55)}.hero{min-height:100svh;position:relative;display:grid;place-items:end center;overflow:hidden;padding:82px 18px 52px;isolation:isolate;background:#111}.hero:before{content:"";position:absolute;inset:0;background:var(--hero) center/cover no-repeat;z-index:-2;transform:scale(1.02)}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.22),rgba(0,0,0,.38) 48%,rgba(0,0,0,.74));z-index:-1}.hero-card{width:min(980px,100%);text-align:center;color:#fff;padding:26px 18px 0}.pill{display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border-radius:999px;border:1px solid rgba(255,255,255,.34);color:rgba(255,255,255,.92);background:rgba(255,255,255,.10);backdrop-filter:blur(12px);font-size:12px;letter-spacing:1.4px;text-transform:uppercase}.hero h1{color:#fff;font-size:clamp(45px,12vw,96px);line-height:.92;letter-spacing:-1px;margin:18px auto;text-shadow:0 18px 50px rgba(0,0,0,.55)}.hero p{color:rgba(255,255,255,.9);font-size:clamp(16px,4vw,21px);max-width:690px;margin:0 auto 26px}.btn-row{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;min-height:48px;min-width:178px;padding:14px 21px;border-radius:999px;font-weight:800;transition:.25s;border:1px solid transparent;cursor:pointer}.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;box-shadow:0 16px 35px rgba(166,123,54,.3)}.btn-glass{background:rgba(255,255,255,.13);color:#fff;border-color:rgba(255,255,255,.44);backdrop-filter:blur(12px)}.btn-outline{background:#fff;color:var(--ink);border-color:rgba(201,169,110,.55)}.float-wa{position:fixed;right:16px;bottom:16px;z-index:80;width:62px;height:62px;border-radius:50%;background:#25D366;color:#fff;display:grid;place-items:center;font-size:28px;font-weight:900;box-shadow:0 18px 40px rgba(0,0,0,.25)}section{padding:78px 18px}.wrap{width:min(1140px,100%);margin:auto}.center{text-align:center}.title{font-size:clamp(34px,8vw,62px);line-height:1;margin-bottom:14px}.subtitle{color:var(--muted);max-width:720px;margin:0 auto 42px;font-size:17px}.soft{background:var(--beige)}.split{display:grid;grid-template-columns:1fr;gap:26px;align-items:center}@media(min-width:850px){.split{grid-template-columns:1fr 1fr;gap:38px}}.photo-frame{border-radius:32px;overflow:hidden;border:1px solid rgba(201,169,110,.4);box-shadow:0 26px 70px rgba(55,39,28,.18);background:#eee}.photo-frame img{height:min(72vh,720px);object-fit:cover}.card{background:rgba(255,255,255,.86);backdrop-filter:blur(14px);border:1px solid rgba(201,169,110,.36);border-radius:32px;padding:30px;box-shadow:0 24px 60px rgba(0,0,0,.08)}.card h2{font-size:clamp(32px,7vw,54px);margin-bottom:16px}.checks{list-style:none;margin:22px 0 0;padding:0;display:grid;gap:12px}.checks li:before{content:"✦";color:var(--gold2);margin-right:10px}.services,.updates-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px}.service,.update-card{background:#fff;border:1px solid rgba(201,169,110,.34);border-radius:26px;overflow:hidden;box-shadow:0 14px 35px rgba(0,0,0,.06)}.service img,.update-card img,.update-card video{height:260px;object-fit:cover}.service div,.update-card div{padding:22px}.service h3,.update-card h3{font-size:25px;margin-bottom:6px}.price{color:var(--gold2);font-weight:900;font-size:18px;margin:12px 0 16px}.banner{background:radial-gradient(circle at top left,rgba(201,169,110,.28),transparent 33%),linear-gradient(135deg,#1d1714,#070606);color:#fff;text-align:center}.banner h2{color:#fff;font-size:clamp(34px,8vw,64px);line-height:1}.banner p,.banner li{color:rgba(255,255,255,.82)}.gallery{columns:1;column-gap:16px}@media(min-width:640px){.gallery{columns:2}}@media(min-width:980px){.gallery{columns:3}}.gallery-card{break-inside:avoid;margin:0 0 16px;overflow:hidden;border-radius:24px;background:#fff;border:1px solid rgba(201,169,110,.28);box-shadow:0 14px 35px rgba(0,0,0,.08)}.gallery-card figcaption{padding:12px 15px;font-weight:800;color:#5d5149;font-size:14px}.lash-grid{display:grid;grid-template-columns:1fr;gap:18px}@media(min-width:760px){.lash-grid{grid-template-columns:1fr 1fr}}.lash-grid img{height:620px;object-fit:cover;border-radius:28px;border:1px solid rgba(201,169,110,.33);box-shadow:0 18px 50px rgba(0,0,0,.12)}.benefits{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:15px}.benefit{background:#fff;border:1px solid rgba(201,169,110,.32);border-radius:22px;padding:22px;font-weight:900;box-shadow:0 12px 28px rgba(0,0,0,.05)}.referral-forms{display:grid;grid-template-columns:1fr;gap:18px}@media(min-width:900px){.referral-forms{grid-template-columns:1fr 1fr}}.form{display:grid;gap:14px;text-align:left}label{font-weight:800;color:var(--dark)}input{width:100%;padding:15px 16px;border-radius:16px;border:1px solid rgba(201,169,110,.55);font:inherit;background:white}.code-card{display:none;margin-top:18px;padding:20px;border-radius:22px;background:#fff8ec;border:1px solid rgba(201,169,110,.55)}.code{font-size:26px;font-weight:900;color:var(--gold2);letter-spacing:1px;word-break:break-all}.notice{font-size:13px;color:var(--muted);margin-top:12px}.success-msg,.error-msg{display:none;margin-top:18px;padding:16px;border-radius:18px;font-weight:800}.success-msg{background:#f4fff7;border:1px solid #8bd59a;color:#245d31}.error-msg{background:#fff4f4;border:1px solid #e4a0a0;color:#8a2222}.faq{max-width:850px;margin:auto;display:grid;gap:14px}details{background:#fff;border:1px solid rgba(201,169,110,.3);border-radius:18px;padding:18px 20px;box-shadow:0 10px 26px rgba(0,0,0,.04)}summary{cursor:pointer;font-weight:900;color:var(--dark)}.contact{background:linear-gradient(rgba(255,250,244,.86),rgba(255,250,244,.93)),var(--contact) center/cover no-repeat}.contact-box{text-align:center;max-width:900px;margin:auto}footer{background:#100d0b;color:rgba(255,255,255,.68);padding:42px 18px 88px;text-align:center}footer h3{color:#fff;font-size:28px;margin-bottom:10px}.reveal{opacity:0;transform:translateY(22px);transition:.7s ease}.reveal.show{opacity:1;transform:none}@media(max-width:520px){section{padding:62px 15px}.service img{height:230px}.lash-grid img{height:500px}.card{padding:24px}}

.ref-steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin:30px 0}
.ref-step{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.22);border-radius:24px;padding:22px;text-align:left;box-shadow:0 18px 50px rgba(0,0,0,.18)}
.ref-step strong{display:inline-grid;place-items:center;width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;margin-bottom:12px}
.ref-benefits{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:22px 0}
.ref-benefit{background:#fff;border:1px solid rgba(201,169,110,.34);border-radius:20px;padding:18px;color:var(--ink);font-weight:900}
.ref-benefit span{display:block;color:var(--gold2);font-size:28px;margin-bottom:4px}
.ref-rules{max-width:850px;margin:20px auto 0;text-align:left;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:26px;padding:22px}
.ref-rules h3{color:#fff;font-size:28px;margin-bottom:12px}
.ref-rules ul{margin:0;padding-left:20px}
.ref-rules li{margin:8px 0}
.ref-faq{max-width:850px;margin:24px auto 0;display:grid;gap:12px}
.ref-faq details{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.18);color:#fff}
.ref-faq summary{color:#fff}

</style>

<body>

<!-- NETLIFY FORMS - Formularios ocultos para que Netlify los detecte y guarde los datos -->
<form name="referidas-eden" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="referidas-eden">
  <input name="bot-field">
  <input name="nombre_completo">
  <input name="whatsapp">
  <input name="cumpleanos">
  <input name="codigo_referida">
  <input name="pagina_origen">
</form>

<form name="uso-codigo-eden" method="POST" data-netlify="true" netlify-honeypot="bot-field-2" hidden>
  
  <input name="bot-field-2">
  <input name="nombre_amiga">
  <input name="whatsapp_amiga">
  <input name="codigo_usado">
  <input name="servicio_deseado">
  <input name="pagina_origen">
</form>

<div class="topbar"><span id="brandTop">EDÉN NAILS BAR</span></div>
<a class="float-wa" id="floatingWa" href="#" target="_blank" rel="noopener noreferrer">✆</a>
<header class="hero" id="hero">
  <div class="hero-card reveal">
    <span class="pill" id="city"></span>
    <h1 id="tagline"></h1>
    <p>Diseños elegantes, brillo impecable y atención personalizada para que tus manos y tu mirada hablen por ti.</p>
    <div class="btn-row">
      <a class="btn btn-primary wa-link" href="#" target="_blank">Reservar por WhatsApp</a>
      <a class="btn btn-glass" href="#referidas">Tengo un código de referida</a>
      <a class="btn btn-glass" href="#novedades">Promociones</a>
      <a class="btn btn-glass" id="igHero" href="#" target="_blank">Ver Instagram</a>
    </div>
  </div>
</header>
<main id="app"></main>
<footer><h3 id="footerBrand"></h3><p>Uñas y pestañas con acabados de lujo.</p><p>© 2026 Edén Nails Bar & Makeup</p></footer>
<script>
async function loadJSON(path){const r=await fetch(path);return r.json();}
async function loadSiteContent(){try{const r=await fetch('/api/content'); if(r.ok) return await r.json();}catch(e){} return {settings: await loadJSON('/content/settings.json'), services: await loadJSON('/content/services.json'), promotions: await loadJSON('/content/promotions.json'), gallery: await loadJSON('/content/gallery.json'), videos: await loadJSON('/content/videos.json'), referrals: await loadJSON('/content/referrals.json')};}
const $=s=>document.querySelector(s);
const app=$("#app");
function esc(s){return (s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}
function imgTag(src, alt){return `<img src="${esc(src)}" alt="${esc(alt)}" loading="lazy">`;}
function waButton(text="Consultar"){return `<a class="btn btn-outline wa-link" href="#" target="_blank">${text}</a>`}
function normalizeName(name){return name.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z\s]/g,"").trim().toUpperCase();}
function makeCode(name, phone){const clean=normalizeName(name);const first=(clean.split(/\s+/)[0]||"EDEN").slice(0,8);const last4=(phone||"").replace(/\D/g,"").slice(-4)||Math.floor(1000+Math.random()*9000);return "EDEN-"+first+"-"+last4;}
function encodeFormData(data){return new URLSearchParams(data).toString();}

const GOOGLE_SCRIPT_URL="https://script.google.com/macros/s/AKfycbx163cZ5fy2UutdijY4z_PV1jmjFcLOhl4mnp5YRGgkW3FM25wIxT1sgfmjsF7xf78x/exec";
function validarEnGoogleSheets(params){
 return new Promise((resolve,reject)=>{
   const callback="edenSheets_"+Date.now()+"_"+Math.floor(Math.random()*100000);
   params.callback=callback;
   window[callback]=(data)=>{ delete window[callback]; script.remove(); resolve(data); };
   const script=document.createElement("script");
   script.src=GOOGLE_SCRIPT_URL+"?"+new URLSearchParams(params).toString();
   script.onerror=()=>{ delete window[callback]; script.remove(); reject(new Error("No se pudo conectar")); };
   document.body.appendChild(script);
 });
}


(async()=>{
 const site = await loadSiteContent();
 const settings=site.settings, services=site.services, promos=site.promotions, gallery=site.gallery, videos=site.videos, referrals=site.referrals;
 document.title=settings.brand;
 document.documentElement.style.setProperty("--hero",`url('${settings.hero_image}')`);
 document.documentElement.style.setProperty("--contact",`url('${gallery[0]?.image||settings.hero_image}')`);
 $("#brandTop").textContent=settings.brand.replace(" & Makeup","");
 $("#city").textContent=settings.city;
 $("#tagline").textContent=settings.tagline;
 $("#footerBrand").textContent=settings.brand;
 $("#floatingWa").href=settings.whatsapp;
 $("#igHero").href=settings.instagram;

 app.innerHTML = `
<section class="soft"><div class="wrap split"><div class="photo-frame reveal">${imgTag(settings.hero_image,settings.brand)}</div><div class="card reveal"><h2>${esc(settings.intro_title)}</h2><p>${esc(settings.intro_text)}</p><ul class="checks"><li>Diseños personalizados y elegantes.</li><li>Acabados brillantes tipo cristal.</li><li>Atención con cita previa.</li><li>Servicios de uñas y pestañas en un solo lugar.</li></ul></div></div></section>
<section><div class="wrap center"><h2 class="title reveal">Servicios favoritos</h2><p class="subtitle reveal">Consulta disponibilidad por WhatsApp y cuéntanos qué diseño quieres realizarte.</p><div class="services">${services.filter(s=>s.featured!==false).map(s=>`<article class="service reveal">${imgTag(s.image,s.title)}<div><h3>${esc(s.title)}</h3><p>${esc(s.description)}</p><p class="price">${esc(s.price)}</p>${waButton()}</div></article>`).join('')}</div></div></section>
<section id="referidas" class="banner"><div class="wrap"><div class="reveal" style="text-align:center;max-width:900px;margin:0 auto 34px;"><h2>${esc(referrals.title)}</h2><p>${esc(referrals.intro)}</p><ul style="text-align:left;max-width:760px;margin:20px auto;line-height:1.8">${referrals.rules.map(r=>`<li>${esc(r)}</li>`).join('')}</ul></div><div class="referral-forms">
<div class="card reveal"><h2 style="font-size:34px">Ya tengo un código de referida</h2><p>Registra aquí el código que te compartió tu amiga para solicitar tu 10% de descuento.</p><form class="form" id="useCodeForm" autocomplete="on"><div><label for="friendName">Tu nombre completo</label><input id="friendName" name="nombre_amiga" required minlength="3" placeholder="Ej: María Rojas"></div><div><label for="friendPhone">Tu WhatsApp</label><input id="friendPhone" name="whatsapp_amiga" required inputmode="tel" pattern="[0-9 +()-]{7,}" placeholder="Ej: 70000000"></div><div><label for="friendCode">Código de referida de tu amiga</label><input id="friendCode" name="codigo_usado" required minlength="8" placeholder="Ej: EDEN-SHARLYN-1561"></div><div><label for="desiredService">Servicio que deseas</label><input id="desiredService" name="servicio_deseado" required placeholder="Ej: Blindaje en Gel"></div><button class="btn btn-primary" type="submit">Registrar mi código</button></form><div class="success-msg" id="useSuccessMsg">Código registrado. Ahora escríbenos por WhatsApp para confirmar tu cita y validar tu beneficio.</div><div class="error-msg" id="useErrorMsg">El código no existe, está inactivo o este WhatsApp ya usó un beneficio.</div><p class="notice">Todos los campos son obligatorios. El 10% con código de amiga es válido por única vez, para 1 servicio y se valida antes de la atención.</p></div>
</div></div></section>
<section id="novedades" class="soft"><div class="wrap center"><h2 class="title reveal">Promociones y videos</h2><p class="subtitle reveal">Aquí podrás publicar promociones del mes, reels o videos MP4.</p><div class="updates-grid">${promos.filter(p=>p.active!==false).map(p=>`<article class="update-card reveal">${imgTag(p.image,p.title)}<div><h3>${esc(p.title)}</h3><p>${esc(p.description)}</p><a class="btn btn-outline wa-link" target="_blank">${esc(p.button_text||'Reservar')}</a></div></article>`).join('')}${videos.filter(v=>v.active!==false).map(v=>`<article class="update-card reveal">${v.video?`<video src="${esc(v.video)}" controls playsinline></video>`:`<div style="height:260px;display:grid;place-items:center;background:linear-gradient(135deg,#1d1714,#3c2f25);color:white;font-weight:900;text-align:center;padding:20px">🎥 Video / Reel</div>`}<div><h3>${esc(v.title)}</h3><p>${esc(v.description)}</p><a class="btn btn-outline" href="${esc(v.link||settings.instagram)}" target="_blank">Ver video</a></div></article>`).join('')}</div></div></section>
<section class="soft"><div class="wrap center"><h2 class="title reveal">Galería de trabajos reales</h2><p class="subtitle reveal">Fotos reales del salón, sin imágenes de stock.</p><div class="gallery">${gallery.map(g=>`<figure class="gallery-card reveal">${imgTag(g.image,g.title)}<figcaption>${esc(g.title)}</figcaption></figure>`).join('')}</div></div></section>
<section><div class="wrap center"><h2 class="title reveal">Extensiones de pestañas</h2><p class="subtitle reveal">Diseños pensados para realzar tu mirada con armonía y elegancia.</p><div class="lash-grid reveal">${imgTag('/assets/images/pestanas.jpg','Pestañas ojos abiertos')}${imgTag('/assets/images/pestanas-cerradas.jpg','Pestañas ojos cerrados')}</div></div></section>
<section class="soft"><div class="wrap center"><h2 class="title reveal">¿Por qué elegirnos?</h2><div class="benefits"><div class="benefit reveal">Productos premium</div><div class="benefit reveal">Diseños personalizados</div><div class="benefit reveal">Acabados de lujo</div><div class="benefit reveal">Bioseguridad</div><div class="benefit reveal">Cita previa</div><div class="benefit reveal">Ambiente cómodo</div></div></div></section>
<section><div class="wrap center"><h2 class="title reveal">Preguntas frecuentes</h2><div class="faq"><details class="reveal"><summary>¿Cómo funciona el código de recomendada?</summary><p>La amiga recibe 10% en 1 servicio y por única vez. La clienta que recomendó acumula 10% por cada amiga que use su código y realice su servicio.</p></details><details class="reveal"><summary>¿Necesito cita previa?</summary><p>Sí, trabajamos con cita previa para darte una atención ordenada.</p></details><details class="reveal"><summary>¿Dónde están ubicadas?</summary><p>En Santa Cruz de la Sierra. Puedes tocar “Cómo llegar” para abrir Google Maps.</p></details></div></div></section>
<section class="contact"><div class="wrap"><div class="card contact-box reveal"><h2>Reserva tu cita</h2><p>Estamos listas para ayudarte a elegir el diseño ideal para ti.</p><p><strong>Ubicación:</strong> ${esc(settings.city)}</p><div class="btn-row"><a class="btn btn-primary wa-link" href="#" target="_blank">WhatsApp</a><a class="btn btn-outline" href="${settings.instagram}" target="_blank">Instagram</a><a class="btn btn-outline" href="${settings.tiktok}" target="_blank">TikTok</a><a class="btn btn-outline" href="${settings.maps}" target="_blank">Cómo llegar</a></div></div></div></section>`;
 document.querySelectorAll('.wa-link').forEach(a=>a.href=settings.whatsapp);
 const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('show')}),{threshold:.12});
 document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
 const copyBtn = $("#copyBtn");
 if(copyBtn){
   copyBtn.addEventListener("click", async()=>{
     try{ await navigator.clipboard.writeText($("#refCode").textContent); copyBtn.textContent="Código copiado"; }
     catch(e){ alert($("#refCode").textContent); }
   });
 }

 const useForm = $("#useCodeForm");
 if(useForm){
   useForm.addEventListener("submit", async e=>{
     e.preventDefault();
     e.stopPropagation();

     $("#useSuccessMsg").style.display="none";
     $("#useErrorMsg").style.display="none";

     const nombre = $("#friendName").value.trim();
     const whatsapp = $("#friendPhone").value.trim();
     const codigo = $("#friendCode").value.trim().toUpperCase();
     const servicio = $("#desiredService").value.trim();

     if(!nombre || !whatsapp || !codigo || !servicio){
       $("#useErrorMsg").textContent="Todos los campos son obligatorios.";
       $("#useErrorMsg").style.display="block";
       return false;
     }

     const btn = useForm.querySelector("button[type='submit']");
     const original = btn.textContent;
     btn.disabled = true;
     btn.textContent = "Validando código...";

     try{
       const result = await validarEnGoogleSheets({
         action: "useCode",
         nombre_amiga: nombre,
         whatsapp_amiga: whatsapp,
         codigo_usado: codigo,
         servicio: servicio
       });

       if(result && result.ok){
         $("#useSuccessMsg").textContent = (result.message || "¡Tu descuento fue registrado correctamente!") + " Referida por: " + (result.referido_por || "clienta Edén") + ". Escríbenos por WhatsApp para confirmar tu cita.";
         $("#useSuccessMsg").style.display="block";
         useForm.reset();
       }else{
         $("#useErrorMsg").textContent = (result && result.message) ? result.message : "Este código no existe o no fue emitido por Edén Nails Bar & Makeup.";
         $("#useErrorMsg").style.display="block";
       }
     }catch(err){
       $("#useErrorMsg").textContent="No se pudo validar el código. Escríbenos por WhatsApp para ayudarte.";
       $("#useErrorMsg").style.display="block";
     }

     btn.disabled=false;
     btn.textContent=original;
     return false;
   });
 }
 await fetch("/",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:encodeFormData(new FormData(f))});$("#useSuccessMsg").style.display="block"}catch(err){$("#useErrorMsg").style.display="block"}});
})();
</script>
</body>
</html>
